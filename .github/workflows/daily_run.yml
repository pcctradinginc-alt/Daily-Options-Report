name: Daily Options Report

on:
  schedule:
    # GitHub cron ist UTC und kennt keine US-DST.
    - cron: '30 14 * 3-10 1-5'       # ca. 10:30 ET waehrend US-DST
    - cron: '30 15 * 1,2,11,12 1-5'  # ca. 10:30 ET Standardzeit

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (kein Email-Versand)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: daily-options-report-journal
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: data-Ordner sicherstellen
        run: mkdir -p data

      - name: Journal-Cache wiederherstellen
        id: journal-cache
        uses: actions/cache/restore@v4
        with:
          path: data/trading_journal.sqlite
          key: trading-journal-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trading-journal-${{ runner.os }}-

      - name: Dependencies installieren
        run: pip install -r requirements.txt

      - name: Bot ausführen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRADIER_TOKEN:     ${{ secrets.TRADIER_TOKEN }}
          TRADIER_SANDBOX:   "false"
          FINNHUB_KEY:       ${{ secrets.FINNHUB_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          GMAIL_RECIPIENT:   ${{ secrets.GMAIL_RECIPIENT }}
          SMTP_SENDER:       ${{ secrets.SMTP_SENDER }}
          SMTP_PASSWORD:     ${{ secrets.SMTP_PASSWORD }}
          SEC_USER_AGENT:    ${{ secrets.SEC_USER_AGENT }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python src/main.py --dry-run --verbose
          else
            python src/main.py --verbose
          fi

      - name: Journal-Cache speichern
        if: always() && hashFiles('data/trading_journal.sqlite') != ''
        uses: actions/cache/save@v4
        with:
          path: data/trading_journal.sqlite
          key: trading-journal-${{ runner.os }}-${{ github.run_id }}

      - name: Journal als Artifact sichern
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-journal-${{ github.run_number }}
          path: data/trading_journal.sqlite
          retention-days: 90
          if-no-files-found: ignore

      - name: Report-Preview speichern
        if: github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: report-preview-${{ github.run_number }}
          path: report_preview.html
          retention-days: 7
          if-no-files-found: ignore
